<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard – Mintcha POS</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .page-content { padding: 0 1.5rem 1.5rem; }
.dashboard-header {
  padding: 1.5rem 1.5rem 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.dashboard-header h1 {
  margin: 0;
}
.dashboard-card h3 {
  justify-content: space-between; /* was: no justify-content, so this pushes the date to the right */
}
.summary-date-filter {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 1rem;
  font-size: .85rem;
  color: #555;
  flex-wrap: wrap;
}
.summary-date-filter input[type="date"] {
  padding: 5px 8px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: .85rem;
}
.summary-date-filter button {
  padding: 5px 12px;
  font-size: .8rem;
  border-radius: 6px;
  border: 1px solid #00897b;
  background: #fff;
  color: #00796b;
  cursor: pointer;
}
.summary-date-filter button:hover { background: #e0f2f1; }
.summary-date {
  font-size: .8rem;
  font-weight: 500;
  color: #777;
  text-transform: none;
  letter-spacing: normal;
}
.drink-breakdown {
  margin-top: 1.25rem;
  border-top: 1px solid #eee;
  padding-top: 1rem;
}
.drink-breakdown h4 {
  margin: 0 0 .6rem;
  font-size: .85rem;
  text-transform: uppercase;
  letter-spacing: .03em;
  color: #777;
}
.drink-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
}
.drink-row .drink-name {
  flex: 1;
  font-size: .9rem;
  font-weight: 600;
  color: #333;
}
.drink-row .drink-bar-track {
  flex: 2;
  background: #f0f0f0;
  border-radius: 6px;
  height: 8px;
  overflow: hidden;
}
.drink-row .drink-bar-fill {
  height: 100%;
  background: #00897b;
  border-radius: 6px;
}
.drink-row .drink-qty {
  width: 34px;
  text-align: right;
  font-weight: 800;
  color: #00796b;
  font-size: .9rem;
}
.user-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #e8f5f3;
  color: #00796b;
  font-size: .85rem;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 999px;
}
.user-badge .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #00c853;
}
    .dashboard-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .dashboard-card h3 {
      margin: 0 0 1rem;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .warning-card #lowStockList { list-style: none; padding: 0; margin: 0; }
    .warning-card #lowStockList li {
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 6px;
      background: #fafafa;
    }
    .warning-card #lowStockList li:last-child { margin-bottom: 0; }

    /* === Today's Summary === */
    .summary-hero {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      background: linear-gradient(135deg, #00796b, #00897b);
      color: #fff;
      border-radius: 10px;
      padding: 1.1rem 1.4rem;
      margin-bottom: 1rem;
    }
    .summary-hero .label { font-size: .8rem; opacity: .85; text-transform: uppercase; letter-spacing: .04em; }
    .summary-hero .value { font-size: 2rem; font-weight: 800; }
.summary-hero {
  flex-direction: column;
  align-items: stretch;
}
.hero-main {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.hero-breakdown {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,.25);
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.hero-row {
  display: flex;
  justify-content: space-between;
  font-size: .82rem;
  opacity: .9;
}
.hero-row-total {
  font-weight: 800;
  font-size: .95rem;
  opacity: 1;
  border-top: 1px solid rgba(255,255,255,.25);
  margin-top: 6px;
  padding-top: 6px;
}
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
    }
    .summary-box .sub-label {
  font-size: .7rem;
  color: #e65100;
  font-weight: 700;
  margin-top: 2px;
}
    .summary-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      border-radius: 10px;
      padding: 14px 10px;
      border: 1px solid #eee;
    }
    .view-mode-toggle {
  display: flex;
  border: 1px solid #00897b;
  border-radius: 6px;
  overflow: hidden;
}
.view-mode-btn {
  padding: 5px 14px;
  font-size: .8rem;
  border: none;
  background: #fff;
  color: #00796b;
  cursor: pointer;
  border-right: 1px solid #00897b;
}
.view-mode-btn:last-child { border-right: none; }
.view-mode-btn.active {
  background: #00897b;
  color: #fff;
  font-weight: 700;
}
.view-mode-btn:hover:not(.active) { background: #e0f2f1; }
    .summary-box .icon { font-size: 1.4rem; margin-bottom: 4px; }
    .summary-box .value { font-size: 1.5rem; font-weight: 800; line-height: 1.1; }
    .summary-box .label { font-size: .72rem; color: #777; text-transform: uppercase; letter-spacing: .03em; margin-top: 4px; }

    .summary-box.total   { background: #e8f5f3; }
    .summary-box.total   .value { color: #00796b; }
    .summary-box.paid    { background: #e3f2fd; }
    .summary-box.paid    .value { color: #1565c0; }
    .summary-box.discount{ background: #fff3e0; }
    .summary-box.discount .value { color: #e65100; }
    .summary-box.free    { background: #fce4ec; }
    .summary-box.free    .value { color: #c2185b; }

    @media (max-width: 500px) {
      .summary-hero .value { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- === SIDEBAR === -->
    <aside class="sidebar">
      <h2 class="brand">🍃 Mintcha</h2>

      <div class="nav-section">
        
        <ul>
          <li class="active"><a href="dashboard.html">Dashboard</a></li>
          <li><a href="sales-overview.html">Sales Overview</a></li>
          <li><a href="order-management.html">Order Management</a></li>
          <li><a href="stock-overview.html">Stock Overview</a></li>
          <li><a href="menu-recipes.html">Menu Recipes</a></li>
          <!-- Admin-only -->
          <li id="adminStockUsageLink" style="display:none;"><a href="stock-usage.html">Stock Usage</a></li>
          <li></li>
          <li></li>
          <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
      </div>

      <div class="nav-section">
        
      </div>
    </aside>

    <!-- === MAIN CONTENT === -->
    <section class="dashboard page">
      <header class="dashboard-header">
        <h1>Welcome to Mintcha POS</h1>
        <span class="user-badge"><span class="dot"></span>Logged in as <strong id="loggedUser"></strong></span>
      </header>

      <div class="page-content">
        <!-- === Today's Summary (Admin only) === -->
         
      <section id="todaySummaryCard" class="dashboard-card" style="display:none;">
          <h3>
            📊 Today's Summary
            <span id="todaySummaryDate" class="summary-date"></span>
          </h3>
           <div class="summary-date-filter">
            <div class="view-mode-toggle">
              <button class="view-mode-btn active" data-mode="day">Day</button>
              <button class="view-mode-btn" data-mode="week">Week</button>
              <button class="view-mode-btn" data-mode="month">Month</button>
            </div>
            <label for="summaryDatePicker">View date:</label>
            <input type="date" id="summaryDatePicker" />
            <button id="summaryTodayBtn" class="admin-btn">Today</button>
          </div>
          <div id="todaySummaryContent"></div>
          <div id="drinkBreakdown"></div>

        </section>

        <!-- === Low Stock Alerts Section === -->
        <section class="dashboard-card warning-card">
          <h3>⚠️ Low Stock Alerts</h3>
          <ul id="lowStockList">
            <!-- Populated by JS -->
          </ul>
        </section>
      </div>
    </section>>

    
  </div>

  <!-- === Scripts === -->
  <script src="js/common.js"></script>
  <script src="js/dashboard.js"></script>


  <script>
    // Show "Stock Usage" link only for admins
    const role = localStorage.getItem("mintchaRole");
    const user = localStorage.getItem("mintchaUser");
    
    if (role === "admin") {
      const usageLink = document.getElementById("adminStockUsageLink");
      if (usageLink) usageLink.style.display = "list-item";
    }

    // Show current user
    document.getElementById("loggedUser").textContent = user || "Unknown";
  </script>
</body>
</html>
